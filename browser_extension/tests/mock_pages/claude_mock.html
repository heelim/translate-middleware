<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Mock - Korean Translation Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    main {
      max-width: 800px;
      margin: 0 auto;
    }
    .chat-container {
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      padding: 16px;
      min-height: 400px;
      background: #0f0f0f;
    }
    [data-message] {
      padding: 12px;
      margin: 8px 0;
      border-radius: 12px;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
    }
    [data-role="user"] {
      background: #2a2a2a;
    }
    [data-role="assistant"] {
      background: #181818;
    }
    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #2d2d2d;
      background: #1a1a1a;
      color: #f4f4f4;
      resize: vertical;
      min-height: 60px;
      font-family: inherit;
      box-sizing: border-box;
    }
    .input-area {
      margin-top: 16px;
    }
    .assistant-message {
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <h1>Claude Mock Interface</h1>
    <div class="chat-container">
      <div data-message data-role="user">
        <div class="user-content">오늘 날씨가 좋네요</div>
      </div>
      <div data-message data-role="assistant">
        <div class="assistant-message assistant-message">Yes, the weather is nice today!</div>
      </div>
      <div data-message data-role="assistant">
        <div class="assistant-message">무엇을 도와드릴까요?</div>
      </div>
    </div>
    <div class="input-area">
      <textarea placeholder="Message Claude...">안녕하세요</textarea>
    </div>
  </main>
</body>
</html>
