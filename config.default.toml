[engine]
engine = "local"
local_model_url = "http://127.0.0.1:1234"
local_model_name = "gemma-4-korean-uncensored"
openai_model = "gpt-4o-mini"
openai_api_key = ""
openai_base_url = "https://api.openai.com/v1"

[behavior]
fail_mode = "open"
streaming_mode = "streaming"
context_mode = "conversation-aware"
output_format = "mixed-korean-english"
korean_detection_mode = true

[logging]
log_level = "info"
log_file = "~/.ko-translate/failures.log"
log_max_bytes = 10485760
log_backup_count = 5

[proxy]
proxy_host = "127.0.0.1"
proxy_port = 8080
proxy_timeout = 60.0

[context]
max_context_turns = 10
preserve_code_blocks = true
preserve_technical_terms = true

[retry]
max_retries = 3
retry_delay = 1.0